services:
  - type: web
    name: ML-BaHA
    env: python
    buildCommand: pip install --only-binary=scipy,numpy,rasterio,scikit-learn,pandas,shapely,pyproj -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
